          - generic [ref=e394]:
            - generic [ref=e395]:
              - heading "Trophy Fish or High Action — You Choose" [level=4] [ref=e396]
              - paragraph [ref=e397]: Iceland's river systems vary wildly — some are built for trophy Brown Trout and Salmon, others give constant action with Arctic Char. Tell your guide the goal and Brynjar picks the right water for the day.
            - generic [ref=e398]:
              - heading "Catch & Release on Iceland's Rivers" [level=4] [ref=e399]
              - paragraph [ref=e400]: Catch and release is standard on Iceland's rivers and mandatory on many beats. Where permitted, you're welcome to keep a fish — grilling a fresh catch on the riverbank is one of those moments you don't forget on a guided fishing trip in Iceland.
            - generic [ref=e401]:
              - heading "Fly Fishing, Spinning & Iceland River Selection" [level=4] [ref=e402]
              - paragraph [ref=e403]: Iceland's rivers are classic fly fishing territory, but the country's lakes and many river sections are equally good for spinning and baitcasting. Every guided trip is matched to your preferred style and target species.
            - generic [ref=e404]:
              - 'heading "Exclusive Access: Þingvallavatn & Private Rivers" [level=4] [ref=e405]'
              - paragraph [ref=e406]: Brynjar has an exceptional track record on Lake Þingvallavatn — one of Iceland's most iconic trout fisheries. He also holds exclusive guide access to a private river 30 minutes from Reykjavík, ideal when other beats are full.
            - generic [ref=e407]:
              - heading "All Transport from Reykjavík Included" [level=4] [ref=e408]
              - paragraph [ref=e409]: Iceland fishing permits must be secured well in advance — your guide handles all of that. Pick-up and drop-off in Reykjavík, transport between pools, and all driving throughout the trip is included.
            - generic [ref=e410]:
              - heading "Fly Fishing Gear Included" [level=4] [ref=e411]
              - paragraph [ref=e412]: "Full gear is available for a small additional fee — #6–7 weight fly rods for rivers and lakes, double-handed or switch rods for salmon beats. Bring your own if you prefer; backup gear is always in the truck."
